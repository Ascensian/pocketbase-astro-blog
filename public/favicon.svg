<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#00e5a0"/>

  <!-- Top face — rounded corners via quadratic bezier -->
  <path d="M 14.21,3.89 Q 16,3 17.79,3.89
           L 26.21,8.11 Q 28,9 26.21,9.89
           L 17.79,14.11 Q 16,15 14.21,14.11
           L 5.79,9.89 Q 4,9 5.79,8.11 Z"
        fill="#00c98e"/>

  <!-- Right face -->
  <path d="M 26.21,9.89 Q 28,9 28,11
           L 28,20 Q 28,22 26.21,22.89
           L 17.79,27.11 Q 16,28 16,26
           L 16,17 Q 16,15 17.79,14.11 Z"
        fill="#00a876"/>

  <!-- Left face -->
  <path d="M 4,11 Q 4,9 5.79,9.89
           L 14.21,14.11 Q 16,15 16,17
           L 16,26 Q 16,28 14.21,27.11
           L 5.79,22.89 Q 4,22 4,20 Z"
        fill="#00ba82"/>

  <!-- Black edges — top face -->
  <path d="M 14.21,3.89 Q 16,3 17.79,3.89
           L 26.21,8.11 Q 28,9 26.21,9.89
           L 17.79,14.11 Q 16,15 14.21,14.11
           L 5.79,9.89 Q 4,9 5.79,8.11 Z"
        fill="none" stroke="#0a0e13" stroke-width="2"/>

  <!-- Black edges — right face -->
  <path d="M 26.21,9.89 Q 28,9 28,11
           L 28,20 Q 28,22 26.21,22.89
           L 17.79,27.11 Q 16,28 16,26
           L 16,17 Q 16,15 17.79,14.11 Z"
        fill="none" stroke="#0a0e13" stroke-width="1.8"/>

  <!-- Black edges — left face -->
  <path d="M 4,11 Q 4,9 5.79,9.89
           L 14.21,14.11 Q 16,15 16,17
           L 16,26 Q 16,28 14.21,27.11
           L 5.79,22.89 Q 4,22 4,20 Z"
        fill="none" stroke="#0a0e13" stroke-width="1.8"/>

  <!-- Center vertical edge -->
  <line x1="16" y1="17" x2="16" y2="26" stroke="#0a0e13" stroke-width="1.5"/>

  <!-- Chain link connectors -->
  <circle cx="16" cy="3" r="1.4" fill="#0a0e13"/>
  <circle cx="28" cy="9" r="1.4" fill="#0a0e13"/>
  <circle cx="4" cy="9" r="1.4" fill="#0a0e13"/>

</svg>
